name: Win & Mac
on:
  - push
  - pull_request
  - merge_group
  - workflow_dispatch

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [windows-latest, macOS-latest]
        ghc: ['8.8', '8.10', '9.0', '9.2', '9.14']
        exclude:
        - os: macOS-latest
          ghc: '8.8'
        - os: macOS-latest
          ghc: '8.10'
        - os: macOS-latest
          ghc: '9.0'
    steps:
    - uses: actions/checkout@v4
    - uses: haskell-actions/setup@v2
      id: setup-haskell-cabal
      with:
        ghc-version: ${{ matrix.ghc }}
    - name: Update cabal package database
      run: cabal update
    - uses: actions/cache@v4
      name: Cache cabal stuff
      with:
        path: |
          ${{ steps.setup-haskell-cabal.outputs.cabal-store }}
          dist-newstyle
        key: ${{ runner.os }}-${{ matrix.ghc }}
    - name: Build and test
      run: |
        cabal sdist -z -o .
        cabal get temporary-ospath-*.tar.gz
        cd temporary-ospath-*/
        cabal test --enable-tests --test-show-details=direct
