name: WASM
on:
  - push
  - pull_request
  - merge_group
  - workflow_dispatch

defaults:
  run:
    shell: bash

jobs:
  wasm:
    runs-on: ubuntu-latest
    env:
      version: wasm32-wasi-9.12.2.20250327
    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      name: Cache cabal stuff
      with:
        path: |
          ~/.cabal/store
          dist-newstyle
        key: ${{ env.version }}
    - name: Setup
      run: |
        ghcup config add-release-channel https://raw.githubusercontent.com/haskell/ghcup-metadata/develop/ghcup-cross-0.0.9.yaml
        cabal update
    - name: Install WASM toolchain
      run: |
        git clone https://gitlab.haskell.org/ghc/ghc-wasm-meta.git
        cd ghc-wasm-meta/
        export SKIP_GHC=yes
        ./setup.sh
        source ~/.ghc-wasm/env
        ~/.ghc-wasm/add_to_github_path.sh
        cd ..
        ghcup install ghc --set ${{ env.version }} -- --host=x86_64-linux --with-intree-gmp --with-system-libffi
    - name: Build
      run: |
        cabal --with-compiler=wasm32-wasi-ghc --with-hc-pkg=wasm32-wasi-ghc-pkg build --enable-tests
